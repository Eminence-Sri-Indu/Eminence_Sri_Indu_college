<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Eminence'26</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 20px 50px;
        }
        
        .login-box {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .login-title {
            text-align: center;
            color: var(--cyan);
            margin-bottom: 30px;
            font-family: 'Orbitron', sans-serif;
        }
        
        .login-form input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }
        
        .login-form button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--electric-blue), var(--deep-purple));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .login-form button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4);
        }
        
        .back-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--soft-yellow);
            text-decoration: none;
        }
        
        .error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Navigation (same as index.html) -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="assets/EMINENCE_JPG.png" alt="Logo" class="logo-icon" height="60px" width="60px">
                <span class="logo-text">Eminence'26</span>
            </div>
            
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#departments" class="nav-link">Events</a>
                <a href="culturals.html" class="nav-link">Culturals</a>
                <a href="annualday.html" class="nav-link">Annual Day</a>
            </div>
        </div>
    </nav>

    <section class="login-container">
        <div class="login-box">
            <h2 class="login-title">Admin Login</h2>
            <form class="login-form" id="adminLoginForm">
                <input type="email" id="adminEmail" placeholder="Admin Email" required>
                <input type="password" id="adminPassword" placeholder="Password" required>
                <button type="submit">Login</button>
                <div class="error-message" id="loginError"></div>
            </form>
            <a href="index.html" class="back-home">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </section>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>
    
    <script>
        // Admin login logic
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const errorElement = document.getElementById('loginError');
            
            try {
                const result = await authManager.login(email, password);
                
                if (result.success) {
                    // Redirect to home page
                    window.location.href = 'index.html';
                } else {
                    errorElement.textContent = result.error;
                    errorElement.style.display = 'block';
                }
            } catch (error) {
                errorElement.textContent = 'Login failed. Please try again.';
                errorElement.style.display = 'block';
            }
        });
    </script>
    <!-- Add this after the login form in admin-login.html -->
<script>
    // Check if already logged in
    firebaseAuth.onAuthStateChanged((user) => {
        const loginForm = document.getElementById('adminLoginForm');
        const loginTitle = document.querySelector('.login-title');
        
        if (user) {
            // Already logged in - show logout option
            loginForm.style.display = 'none';
            loginTitle.textContent = 'Already Logged In';
            
            const logoutSection = document.createElement('div');
            logoutSection.innerHTML = `
                <div style="text-align: center; margin: 30px 0;">
                    <p style="color: var(--soft-yellow); margin-bottom: 20px;">
                        You are already logged in as:<br>
                        <strong>${user.email}</strong>
                    </p>
                    <button onclick="firebaseAuth.signOut().then(() => window.location.reload())" 
                            style="
                                background: linear-gradient(135deg, var(--accent-orange), var(--neon-pink));
                                color: white;
                                border: none;
                                padding: 12px 30px;
                                border-radius: 25px;
                                cursor: pointer;
                                font-weight: 600;
                                margin-right: 10px;
                            ">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                    <a href="index.html" style="
                        display: inline-block;
                        padding: 12px 30px;
                        background: var(--glass-bg);
                        color: white;
                        border: 1px solid var(--glass-border);
                        border-radius: 25px;
                        text-decoration: none;
                    ">
                        <i class="fas fa-home"></i> Go to Home
                    </a>
                </div>
            `;
            
            loginForm.parentNode.insertBefore(logoutSection, loginForm.nextSibling);
        }
    });
</script>
    <!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<!-- Project JS Files -->
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/role-check.js"></script>
<script src="js/events.js"></script>
<script src="js/admin.js"></script>
<script src="js/logout.js"></script>
</body>
</html>
